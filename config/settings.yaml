# YouTube 동영상 제작 에이전트 설정

channel:
  name: "외국인의 한국 생활"
  language: "ko"
  target_audience: "한국인 30~50대"  # 타겟 시청자
  concept: "외국인이 한국에서 겪는 경험을 한국인 시청자가 재발견하는 채널"
  target_duration_minutes: 8
  target_word_count: 1300   # 한국어 기준 8분 분량

llm:
  provider: "anthropic"         # anthropic | openai | ollama
  model: "claude-opus-4-5"
  temperature: 0.7
  max_tokens: 4096

# API 키는 .env 파일에 저장
# OPENAI_API_KEY=sk-...
# YOUTUBE_API_KEY=AIza...  (없으면 LLM 기반 시뮬레이션으로 대체)

research:
  youtube_search_queries:
    - "foreigner life in Korea vlog"
    - "living in Korea as a foreigner"
    - "culture shock Korea foreigner"
    - "expat Korea daily life"
    - "American living in Korea"
    - "European living in Korea"
  excluded_languages:
    - "ko"          # 한국어 영상 제외
  preferred_transcript_languages:
    - "en"          # 영어 우선
    - "en-US"
    - "en-GB"
    - "auto"        # 자동 생성 자막 허용
  max_results_per_query: 10   # 쿼리당 최대 검색 결과 수
  top_videos_to_rank: 15      # 최종 랭킹에 포함할 동영상 수
  ranking_weights:
    views: 0.4
    likes: 0.3
    recency: 0.2
    relevance: 0.1

paths:
  episodes_dir: "episodes"
  templates_dir: "templates"

episode:
  id_prefix: "ep"
  id_padding: 3               # ep001, ep002, ...
